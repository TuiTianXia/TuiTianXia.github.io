name: Deploy Docusaurus to GitHub Pages

# 触发条件：推送到main分支 或 手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 任务配置
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 安装Node.js 20（匹配Docusaurus 3.x要求）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建静态文件（云端执行，手机不用跑）
      - name: Build Docusaurus
        run: npm run build

      # 5. 部署到GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build