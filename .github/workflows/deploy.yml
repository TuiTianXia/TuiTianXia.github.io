name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 🔴 核心权限配置：给Actions完整读写权限，根治exit 128
permissions:
  contents: read
  pages: write
  id-token: write

# 绑定GitHub Pages官方环境
environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 🔴 核心：完整克隆所有Git历史，解决浅克隆导致的exit 128
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
